name: secure_lan_messenger
description: "A secure chat LAN messenger"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  crypto: ^3.0.7
  cryptography: ^2.9.0
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  pointycastle: ^4.0.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.13

flutter:
  uses-material-design: true

msix_config:
  display_name: Secure Lan Messenger
  publisher_display_name: Daniele Barra
  identity_name: DanieleBarra.SecureLanMessenger
  msix_version: 1.0.0.0
  logo_path: C:\Users\barrd\Desktop\Secure LAN Messenger\secure_lan_messenger\windows\runner\resources\app_icon.ico
  capabilities: internetClient, picturesLibrary, videosLibrary, removableStorage, privateNetworkClientServer, 
